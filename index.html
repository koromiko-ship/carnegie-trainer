<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人を動かす — AI実践トレーナー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;600;700&display=swap');

  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --accent: #8b3a2a;
    --gold: #c9a84c;
    --muted: #7a6f62;
    --correct: #2d6a4f;
    --wrong: #8b3a2a;
    --surface: #ede8dc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 620px; }

  header { text-align: center; margin-bottom: 32px; }
  .header-label { font-size: 11px; letter-spacing: 0.25em; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-size: clamp(20px, 5vw, 30px); font-weight: 700; line-height: 1.3; }
  h1 span { color: var(--accent); }
  .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 14px auto; }
  .subtitle { font-size: 13px; color: var(--muted); line-height: 1.8; }

  .setup-card {
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 24px rgba(26,20,16,0.08);
    position: relative;
    overflow: hidden;
  }
  .setup-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--accent));
  }

  .setup-label { font-size: 12px; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; }
  .setup-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }

  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .theme-btn {
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 12px 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    color: var(--ink);
  }
  .theme-btn:hover { border-color: var(--gold); background: white; }
  .theme-btn.selected { border-color: var(--accent); background: white; color: var(--accent); font-weight: 700; }

  .difficulty-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .diff-btn {
    flex: 1;
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    color: var(--ink);
  }
  .diff-btn:hover { border-color: var(--gold); background: white; }
  .diff-btn.selected { border-color: var(--accent); background: white; color: var(--accent); font-weight: 700; }

  .api-input-wrap { margin-bottom: 20px; }
  .api-input-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
  .api-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--surface);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
    color: var(--ink);
    transition: border-color 0.2s;
    outline: none;
  }
  .api-input:focus { border-color: var(--gold); background: white; }
  .api-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

  .start-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #6b2318);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .start-btn:hover:not(:disabled) { opacity: 0.9; transform: scale(0.99); }
  .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .loading-card {
    background: white;
    border-radius: 16px;
    padding: 48px 24px;
    box-shadow: 0 2px 24px rgba(26,20,16,0.08);
    text-align: center;
    display: none;
  }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--surface);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--muted); }

  .progress-bar-wrap { background: var(--surface); border-radius: 99px; height: 6px; margin-bottom: 8px; overflow: hidden; display: none; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--accent)); border-radius: 99px; transition: width 0.5s ease; }
  .progress-label { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 20px; letter-spacing: 0.05em; display: none; }

  .card {
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 24px rgba(26,20,16,0.08);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    display: none;
  }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--accent)); }
  .scenario-tag { display: inline-block; font-size: 10px; letter-spacing: 0.15em; background: var(--surface); color: var(--muted); padding: 3px 10px; border-radius: 99px; margin-bottom: 14px; text-transform: uppercase; }
  .principle-badge { position: absolute; top: 18px; right: 18px; font-size: 10px; color: var(--gold); letter-spacing: 0.1em; text-align: right; max-width: 120px; }
  .question { font-size: 16px; line-height: 1.85; color: var(--ink); margin-bottom: 22px; font-weight: 600; }
  .scene { background: var(--surface); border-left: 3px solid var(--gold); padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 13.5px; line-height: 1.8; color: var(--ink); margin-bottom: 22px; font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: var(--surface); border: 1.5px solid transparent; border-radius: 10px; padding: 14px 16px; text-align: left; font-family: inherit; font-size: 14px; line-height: 1.6; color: var(--ink); cursor: pointer; transition: all 0.2s; }
  .option-btn:hover:not(:disabled) { border-color: var(--gold); background: #fff; transform: translateX(3px); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: #e8f5ee; border-color: var(--correct); color: var(--correct); }
  .option-btn.wrong { background: #fdf0ee; border-color: var(--wrong); color: var(--wrong); }
  .option-btn.dimmed { opacity: 0.4; }

  .feedback { margin-top: 18px; padding: 16px; border-radius: 10px; font-size: 14px; line-height: 1.8; display: none; }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #e8f5ee; color: #1b4d35; }
  .feedback.wrong-fb { background: #fdf0ee; color: #6b2318; }
  .feedback-title { font-weight: 700; font-size: 13px; letter-spacing: 0.05em; margin-bottom: 6px; }
  .carnegie-quote { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.08); font-size: 12.5px; color: var(--muted); font-style: italic; }

  .next-btn { display: none; width: 100%; margin-top: 16px; padding: 15px; background: linear-gradient(135deg, var(--accent), #6b2318); color: white; border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.2s; }
  .next-btn:hover { opacity: 0.9; }
  .next-btn.show { display: block; }

  .score-card { background: white; border-radius: 16px; padding: 36px 24px; text-align: center; box-shadow: 0 2px 24px rgba(26,20,16,0.08); display: none; }
  .score-card.show { display: block; }
  .score-num { font-size: 64px; font-weight: 700; color: var(--accent); line-height: 1; }
  .score-label { font-size: 14px; color: var(--muted); margin-top: 8px; }
  .score-msg { margin: 20px 0; font-size: 15px; line-height: 1.8; color: var(--ink); }
  .score-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .restart-btn { padding: 14px 24px; background: var(--ink); color: var(--paper); border: none; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
  .restart-btn:hover { opacity: 0.85; }
  .retry-btn { padding: 14px 24px; background: var(--surface); color: var(--ink); border: 2px solid var(--gold); border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
  .retry-btn:hover { background: white; }
  .review-list { margin-top: 24px; text-align: left; }
  .review-item { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; margin-bottom: 8px; }
  .review-item.r-correct { background: #e8f5ee; color: #1b4d35; }
  .review-item.r-wrong { background: #fdf0ee; color: #6b2318; }

  .error-msg { background: #fdf0ee; color: #6b2318; padding: 16px; border-radius: 10px; font-size: 14px; margin-top: 16px; display: none; line-height: 1.7; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-label">Dale Carnegie × AI実践トレーナー</div>
    <h1>人を<span>動かす</span>、<br>まず自分が変わる</h1>
    <div class="divider"></div>
    <p class="subtitle">テーマと難易度を選んで、AIが毎回新しい問題を生成。</p>
  </header>

  <div class="setup-card" id="setupCard">
    <div class="api-input-wrap">
      <div class="setup-label">APIキー</div>
      <div class="setup-title">Anthropic APIキーを入力</div>
      <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-..." />
      <div class="api-hint">※ キーはブラウザ内にのみ保存され、外部には送信されません。</div>
    </div>

    <div class="setup-label">Step 1</div>
    <div class="setup-title">テーマを選ぶ（複数OK）</div>
    <div class="theme-grid" id="themeGrid">
      <button class="theme-btn" data-theme="友人関係">👫 友人関係</button>
      <button class="theme-btn" data-theme="バイト・職場">💼 バイト・職場</button>
      <button class="theme-btn" data-theme="SNS・発信">📱 SNS・発信</button>
      <button class="theme-btn" data-theme="恋愛">💌 恋愛</button>
      <button class="theme-btn" data-theme="家族">🏠 家族</button>
      <button class="theme-btn" data-theme="自己変革">🌱 自己変革</button>
    </div>

    <div class="setup-label">Step 2</div>
    <div class="setup-title">難易度を選ぶ</div>
    <div class="difficulty-row" id="diffRow">
      <button class="diff-btn" data-diff="入門">🌱 入門</button>
      <button class="diff-btn" data-diff="実践">⚡ 実践</button>
      <button class="diff-btn" data-diff="上級">🔥 上級</button>
    </div>

    <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>AIで問題を生成する →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="loading-card" id="loadingCard">
    <div class="loading-spinner"></div>
    <div class="loading-text">AIが問題を生成中...</div>
  </div>

  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel"></div>

  <div class="card" id="questionCard">
    <div class="scenario-tag" id="scenarioTag"></div>
    <div class="principle-badge" id="principleTag"></div>
    <div class="scene" id="sceneText"></div>
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsWrap"></div>
    <div class="feedback" id="feedbackBox">
      <div class="feedback-title" id="feedbackTitle"></div>
      <div id="feedbackBody"></div>
      <div class="carnegie-quote" id="carnegieQuote"></div>
    </div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の場面へ →</button>

  <div class="score-card" id="scoreCard">
    <div class="score-num" id="scoreNum"></div>
    <div class="score-label" id="scoreLabel">/ 5問</div>
    <div class="score-msg" id="scoreMsg"></div>
    <div class="review-list" id="reviewList"></div>
    <br>
    <div class="score-actions">
      <button class="retry-btn" onclick="retrySetup()">別のテーマで挑戦</button>
      <button class="restart-btn" onclick="restartSame()">同じ設定でもう一度</button>
    </div>
  </div>
</div>

<script>
let selectedThemes = [];
let selectedDiff = '';
let questions = [];
let current = 0;
let score = 0;
let history = [];
let lastThemes = [];
let lastDiff = '';

document.getElementById('apiKeyInput').addEventListener('input', updateStartBtn);

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('selected');
    const theme = btn.dataset.theme;
    if (selectedThemes.includes(theme)) {
      selectedThemes = selectedThemes.filter(t => t !== theme);
    } else {
      selectedThemes.push(theme);
    }
    updateStartBtn();
  });
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDiff = btn.dataset.diff;
    updateStartBtn();
  });
});

function updateStartBtn() {
  const key = document.getElementById('apiKeyInput').value.trim();
  document.getElementById('startBtn').disabled = !key || selectedThemes.length === 0 || !selectedDiff;
}

async function startQuiz() {
  lastThemes = [...selectedThemes];
  lastDiff = selectedDiff;
  await generateQuestions();
}

async function generateQuestions() {
  document.getElementById('setupCard').style.display = 'none';
  document.getElementById('scoreCard').className = 'score-card';
  document.getElementById('loadingCard').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';

  const apiKey = document.getElementById('apiKeyInput').value.trim();

  const prompt = `あなたはデール・カーネギーの「人を動かす」の専門家トレーナーです。
テーマ: ${lastThemes.join('、')}
難易度: ${lastDiff}

以下のJSON形式で、5問のクイズ問題を生成してください。
難易度「入門」は日常的でわかりやすいシーン、「実践」はやや複雑、「上級」は微妙な判断が必要なシーン。

必ずこのJSON形式のみで返答してください（マークダウンや説明文は不要）:
{
  "questions": [
    {
      "scenario": "場面カテゴリ（短く）",
      "principle": "カーネギーの原則名（短く）",
      "scene": "具体的なシナリオ説明（2〜3文）",
      "question": "あなたはどう対応する？",
      "options": ["選択肢A", "選択肢B", "選択肢C", "選択肢D"],
      "correct": 0,
      "feedback": "解説（なぜその答えがカーネギー的に正しいか）",
      "quote": "関連するカーネギーの言葉（日本語）— カーネギー"
    }
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'APIエラー');
    }

    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    questions = parsed.questions;
    current = 0; score = 0; history = [];

    document.getElementById('loadingCard').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('progressLabel').style.display = 'block';
    document.getElementById('questionCard').style.display = 'block';
    renderQuestion();

  } catch(e) {
    document.getElementById('loadingCard').style.display = 'none';
    document.getElementById('setupCard').style.display = 'block';
    const errEl = document.getElementById('errorMsg');
    errEl.textContent = `エラー: ${e.message}。APIキーを確認して再試行してください。`;
    errEl.style.display = 'block';
  }
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('scenarioTag').textContent = q.scenario;
  document.getElementById('principleTag').textContent = `原則: ${q.principle}`;
  document.getElementById('sceneText').textContent = q.scene;
  document.getElementById('questionText').textContent = q.question;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });

  document.getElementById('feedbackBox').className = 'feedback';
  document.getElementById('nextBtn').className = 'next-btn';
  updateProgress();
}

function selectAnswer(idx) {
  const q = questions[current];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = idx === q.correct;
  if (isCorrect) score++;

  buttons.forEach((b, i) => {
    if (i === q.correct) b.classList.add('correct');
    else if (i === idx && !isCorrect) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });

  const fb = document.getElementById('feedbackBox');
  document.getElementById('feedbackTitle').textContent = isCorrect ? '✓ カーネギー的に◎' : '△ もう一歩！';
  document.getElementById('feedbackBody').textContent = q.feedback;
  document.getElementById('carnegieQuote').textContent = q.quote;
  fb.className = `feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'} show`;
  document.getElementById('nextBtn').className = 'next-btn show';

  history.push({ q: q.question, correct: isCorrect, principle: q.principle });
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showScore();
  } else {
    const card = document.getElementById('questionCard');
    card.style.opacity = '0';
    setTimeout(() => {
      renderQuestion();
      card.style.transition = 'opacity 0.3s';
      card.style.opacity = '1';
    }, 200);
    document.getElementById('nextBtn').className = 'next-btn';
  }
}

function updateProgress() {
  const pct = (current / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${current + 1} / ${questions.length}問`;
}

function showScore() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${questions.length} / ${questions.length}問`;

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreLabel').textContent = `/ ${questions.length}問`;

  let msg;
  if (pct >= 80) msg = '素晴らしい！カーネギーの精神が身についている。あとは実際の場面で使うだけ。';
  else if (pct >= 60) msg = '半分以上できている。苦手だった場面を振り返って、次の機会に試してみよう。';
  else msg = 'このトレーニングを繰り返すことが「準備」になる。別のテーマや難易度でも試してみよう。';
  document.getElementById('scoreMsg').textContent = msg;

  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  history.forEach(h => {
    const div = document.createElement('div');
    div.className = `review-item ${h.correct ? 'r-correct' : 'r-wrong'}`;
    div.textContent = `${h.correct ? '✓' : '✗'} [${h.principle}] ${h.q}`;
    reviewList.appendChild(div);
  });

  document.getElementById('scoreCard').className = 'score-card show';
}

function retrySetup() {
  document.getElementById('scoreCard').className = 'score-card';
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressLabel').style.display = 'none';
  selectedThemes = [];
  selectedDiff = '';
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('startBtn').disabled = true;
  document.getElementById('setupCard').style.display = 'block';
}

async function restartSame() {
  document.getElementById('scoreCard').className = 'score-card';
  document.getElementById('nextBtn').style.display = 'block';
  await generateQuestions();
}
</script>
</body>
</html>
